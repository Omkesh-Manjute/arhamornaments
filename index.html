<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ARHAM ORNAMENTS - Premium Jewellery Store</title>
  <meta name="description"
    content="Discover exquisite jewellery collections - Rings, Necklaces, Earrings & more. Shop premium gold, diamond and silver jewellery online." />
  <meta name="theme-color" content="#d4af37" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" href="/images/logo.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ARHAM ORNAMENTS" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    // Security measures to prevent image saving and screenshots
    document.addEventListener('contextmenu', event => event.preventDefault());
    
    document.addEventListener('dragstart', event => {
      if (event.target.nodeName === 'IMG') {
        event.preventDefault();
      }
    });

    document.addEventListener('keydown', (e) => {
      // Prevent F12, Ctrl+Shift+I, Ctrl+Shift+J, Ctrl+U
      if (
        e.key === 'F12' ||
        (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'i' || e.key === 'j' || e.key === 'C' || e.key === 'c')) ||
        (e.ctrlKey && (e.key === 'U' || e.key === 'u'))
      ) {
        e.preventDefault();
        return false;
      }
      // Prevent Ctrl+S, Ctrl+P
      if (e.ctrlKey && (e.key === 's' || e.key === 'S' || e.key === 'p' || e.key === 'P')) {
        e.preventDefault();
        return false;
      }
    });
    
    document.addEventListener('keyup', (e) => {
      if (e.key === 'PrintScreen') {
        navigator.clipboard.writeText('');
      }
    });
  </script>
</body>

</html>
